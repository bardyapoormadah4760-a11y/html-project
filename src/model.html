<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حذف دانش آموز</title>
    <!-- فونت وزیر برای نمایش بهتر فارسی -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Vazirmatn', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <!-- Overlay: پوشاندن کل صفحه و قرار دادن مودال در وسط -->
    <div class="fixed inset-0 flex items-center justify-center p-4 z-50">
        <!-- Card: کارت اصلی مودال -->
        <div class="bg-[#fff] rounded-3xl shadow-xl w-full max-w-[642px] sm:w-[90%]">
            <!-- Header -->
            <div class="flex items-center justify-between px-6 sm:px-8 pt-6 sm:pt-7 pb-5">
                <!-- سمت راست: آیکون هشدار + عنوان -->
                <div class="flex items-center gap-3">
                    <!-- آیکون هشدار -->
                    <img src="img/khatar.png" alt="">
                    <!-- عنوان -->
                    <h2 class="text-2xl sm:text-[32px] font-bold text-gray-900 leading-tight">
                        حذف دانش آموز
                    </h2>
                </div>
                <!-- سمت چپ: دکمه بستن -->
                <button type="button" class="text-gray-400 hover:text-gray-600 transition-colors cursor-pointer">
                    <img src="img/zabdar.png" alt="">
                </button>
            </div>
            <!-- Divider بالا -->
            <div class="border-b border-gray-200"></div>
            <!-- Body: متن تأیید حذف -->
            <div class="px-6 sm:px-8 py-8 sm:py-10">
                <p class="text-center font-bold text-gray-700 text-base sm:text-lg leading-8 sm:leading-9">
                    آیا از حذف این دانش آموز اطمینان دارید؟ این عمل
                    <br class="hidden sm:block" />
                    غیر قابل بازگشت است.
                </p>
            </div>
            <!-- Divider پایین -->
            <div class="border-b border-gray-200"></div>
            <!-- Footer: دکمه‌های تایید و انصراف -->
            <div class="flex items-end gap-3 px-6 sm:px-8 py-5 cursor-pointer sm:py-6">
                <!-- دکمه تایید (قرمز) -->
                <button type="button"class="bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl px-8 py-2.5 transition-colors">
                    تایید
                </button>
                <!-- دکمه انصراف (سفید) -->
                <button type="button"class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold rounded-xl px-8 py-2.5 transition-colors">
                    انصراف
                </button>
            </div>
        </div>
    </div>
</body>

</html>
